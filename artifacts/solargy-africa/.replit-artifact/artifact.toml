kind = "web"
previewPath = "/"
title = "Solargy Africa"
version = "1.0.0"
id = "artifacts/solargy-africa"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21275

[services.development]
run = "pnpm --filter @workspace/solargy-africa run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/solargy-africa", "run", "build" ]
publicDir = "artifacts/solargy-africa/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21275"
BASE_PATH = "/"
